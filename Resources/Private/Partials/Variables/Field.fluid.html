<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:switch expression="{var.type}">
    <f:case value="color">
        <f:if condition="{var.picker}">
            <f:then>
                <div class="bb-color-row">
                    <input type="color" class="bb-color-picker" data-picker-for="bb-{var.key}" value="{var.default}"/>
                    <input type="text" id="bb-{var.key}" name="variables[{var.key}]" value="{value}" placeholder="{var.default}" class="form-control bb-color" data-bb-key="{var.key}"/>
                    <f:if condition="{var.colorRef}">
                        <select class="form-select bb-color-ref" data-ref-for="bb-{var.key}" title="Use a theme color reference">
                            <option value="">$ref…</option>
                            <option value="$primary">$primary</option>
                            <option value="$secondary">$secondary</option>
                            <option value="$success">$success</option>
                            <option value="$info">$info</option>
                            <option value="$warning">$warning</option>
                            <option value="$danger">$danger</option>
                            <option value="$light">$light</option>
                            <option value="$dark">$dark</option>
                            <option value="$body-color">$body-color</option>
                            <option value="$body-bg">$body-bg</option>
                            <option value="$white">$white</option>
                            <option value="$black">$black</option>
                        </select>
                    </f:if>
                </div>
            </f:then>
            <f:else>
                <input type="text" id="bb-{var.key}" name="variables[{var.key}]" value="{value}" placeholder="{var.default}" class="form-control bb-color" data-bb-key="{var.key}"/>
            </f:else>
        </f:if>
    </f:case>
    <f:case value="boolean">
        <div class="form-check form-switch bb-switch">
            <input type="hidden" name="variables[{var.key}]" value="false"/>
            <f:if condition="{value} == 'true'">
                <f:then><input class="form-check-input" type="checkbox" role="switch" id="bb-{var.key}" name="variables[{var.key}]" value="true" data-bb-key="{var.key}" checked="checked"/></f:then>
                <f:else><input class="form-check-input" type="checkbox" role="switch" id="bb-{var.key}" name="variables[{var.key}]" value="true" data-bb-key="{var.key}"/></f:else>
            </f:if>
            <label class="form-check-label" for="bb-{var.key}"><code>${var.key}</code></label>
        </div>
    </f:case>
    <f:case value="select">
        <f:form.select name="variables[{var.key}]" value="{value}" options="{var.options}" prependOptionLabel="{var.default}" prependOptionValue="" class="form-select" additionalAttributes="{data-bb-key: var.key}"/>
    </f:case>
    <f:defaultCase>
        <input type="text" id="bb-{var.key}" name="variables[{var.key}]" value="{value}" placeholder="{var.default}" class="form-control" data-bb-key="{var.key}"/>
    </f:defaultCase>
</f:switch>
</html>
